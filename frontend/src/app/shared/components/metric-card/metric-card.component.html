<div class="metric-card" [ngClass]="'color-' + color">
  <div class="metric-header">
    <span class="metric-icon" *ngIf="icon">{{ icon }}</span>
    <span class="metric-label">{{ label }}</span>
  </div>
  
  <div class="metric-value">{{ value }}</div>
  
  <div class="metric-trend" *ngIf="trend !== undefined">
    <span [ngClass]="trend >= 0 ? 'trend-positive' : 'trend-negative'">
      {{ trend >= 0 ? '↑' : '↓' }} {{ trend | number:'1.1-1' }}%
    </span>
  </div>
</div>
