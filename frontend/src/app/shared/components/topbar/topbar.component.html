<header class="topbar">
  <div class="topbar-left">
    <h2 class="page-title">{{ pageTitleKey | transloco }}</h2>
  </div>

  <div class="topbar-right">
    <!-- Language selector -->
    <div class="control-group">
      <button
        *ngFor="let lang of languages"
        (click)="changeLanguage(lang.code)"
        [class.active]="currentLang === lang.code"
        class="btn-lang"
        [title]="'Changer la langue en ' + lang.label"
      >
        {{ lang.label }}
      </button>
    </div>

    <!-- Theme toggle -->
    <button
      (click)="toggleTheme()"
      class="btn-icon"
      [title]="(isDarkMode ? 'Passer en mode clair' : 'Passer en mode sombre') | transloco"
    >
      <span class="material-icons">{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</span>
    </button>

    <!-- User info & logout -->
    <div class="user-info" *ngIf="isAuthenticated">
      <span class="material-icons user-icon">account_circle</span>
      <span class="user-name">{{ customerName || 'Account' }}</span>
      <button (click)="logout()" class="btn-logout" title="{{ 'auth.logout' | transloco }}">
        <span class="material-icons">logout</span>
        <span>{{ 'auth.logout' | transloco }}</span>
      </button>
    </div>
  </div>
</header>
