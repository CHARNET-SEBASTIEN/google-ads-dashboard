# Streamlit Configuration - RAFO Theme

[theme]
# Primary color
primaryColor = "#ca2b2b"  # Rouge RAFO

# Background color (Mode sombre par défaut pour éviter flash blanc)
backgroundColor = "#161413"  # Fond sombre RAFO

# Secondary background color
secondaryBackgroundColor = "#1b1a18"  # Sidebar sombre RAFO

# Text color
textColor = "#eeece8"  # Texte clair RAFO

# Font
font = "sans serif"

[server]
# Headless mode for production
headless = true

# Port
port = 8501

# Enable CORS (must be true when XSRF protection is enabled)
enableCORS = true

# Enable XSRF protection
enableXsrfProtection = true

[browser]
# Gather usage stats
gatherUsageStats = false

# Server address
serverAddress = "0.0.0.0"

[client]
# Show sidebar navigation (deprecated config moved here)
showSidebarNavigation = false

[ui]
# Hide the hamburger menu
hideTopBar = false
